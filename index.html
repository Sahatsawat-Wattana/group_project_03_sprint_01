    <title>Readly</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap');
        @keyframes scroll {
          /* เริ่มต้นที่ตำแหน่งปกติ */
          from { transform: translateX(0); }
          /* เลื่อนไปทางซ้าย 50% (เพราะเรามีของ 2 ชุดที่เหมือนกัน ชุดที่สองจะมาแทนที่ชุดแรกพอดี) */
          to { transform: translateX(-50%); }
        }

        .animate-scroll {
          /* สั่งให้ใช้ animation ชื่อ scroll / ระยะเวลา 20 วินาที / ความเร็วสม่ำเสมอ / วนลูปไม่สิ้นสุด */
          animation: scroll 20s linear infinite;
        }

        /* เทคนิคพิเศษ: เมื่อเอาเมาส์มาวาง (Hover) ให้หยุดเลื่อน เพื่อให้คนอ่านเนื้อหาได้ */
        .animate-scroll:hover {
          animation-play-state: paused;
        }
    </style>
  </head>
